<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>MiMo Code</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="app" class="app-shell">
  <section id="authView" class="auth-view hidden">
    <div class="auth-card">
      <div class="brand-mark">Mi</div>
      <h1>MiMo Code</h1>
      <p id="authHint">正在检查状态...</p>
      <input id="passwordInput" class="input" type="password" autocomplete="current-password" placeholder="管理密码">
      <button id="authBtn" class="btn primary">继续</button>
      <button id="clearTokenBtn" class="btn ghost">清除本机登录缓存</button>
      <div id="authMsg" class="msg"></div>
    </div>
  </section>

  <section id="mainView" class="main-view hidden">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark small">Mi</div>
        <div>
          <div class="brand-title">MiMo Code</div>
          <div id="statusLine" class="brand-sub">加载中...</div>
        </div>
      </div>
      <nav class="top-actions">
        <button class="tab active" data-view="workspace">工作台</button>
        <button class="tab" data-view="official">官方会话</button>
        <button class="tab" data-view="providers">模型与服务商</button>
        <button class="tab" data-view="sessions">会话历史</button>
        <button class="tab" data-view="logs">日志与建议</button>
        <button class="tab" data-view="advanced">高级设置</button>
        <button class="tab hidden" data-view="toolbox">工具箱</button>
        <button id="logoutBtn" class="btn ghost compact">退出</button>
      </nav>
    </header>
    <main id="content" class="content"></main>
  </section>
</div>
<script src="/js/app.js"></script>
</body>
</html>
