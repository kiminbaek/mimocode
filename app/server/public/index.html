<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MiMo Code 工作台</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="authView" class="auth card">
    <h1>MiMo Code</h1><p id="authHint" class="muted"></p>
    <input id="passwordInput" type="password" placeholder="管理密码" autocomplete="current-password">
    <button id="authBtn" class="btn primary">进入</button><p id="authMsg" class="msg"></p>
  </div>
  <div id="mainView" class="hidden shell">
    <aside class="side">
      <div class="brand"><b>MiMo Code</b><span id="versionBadge">v-</span></div>
      <button class="tab active" data-view="workspace">工作台</button>
      <button class="tab" data-view="freeModels">免费模型</button>
      <button class="tab" data-view="providers">Provider</button>
      <button class="tab" data-view="overview">项目概览</button>
      <button class="tab" data-view="health">健康检查</button>
      <button class="tab" data-view="security">安全说明</button>
      <button class="tab" data-view="backup">配置备份</button>
      <button class="tab" data-view="toolbox">工具箱</button>
      <button class="tab" data-view="logs">日志诊断</button>
      <button class="tab" data-view="advanced">高级设置</button>
    </aside>
    <main class="main">
      <header class="top"><div><h1 id="viewTitle">工作台</h1><p id="subTitle">状态、模型、诊断与入口</p></div><div class="top-actions"><button id="refreshBtn" class="btn">刷新</button><button id="logoutBtn" class="btn">退出登录</button><button id="officialBtn" class="btn primary">官方会话 ↗</button></div></header>
      <section id="content"></section>
    </main>
  </div>
  <script src="/js/app.js"></script>
</body>
</html>
